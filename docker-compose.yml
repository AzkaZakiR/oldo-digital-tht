version: "3.9"

services:
   app:
      build: .
      container_name: go_fiber_app
      ports:
         - "3000:3000"
      depends_on:
         - db
      environment:
         DB_HOST: db
         DB_PORT: 5432
         DB_USER: postgres
         DB_PASSWORD: postgres
         DB_NAME: oldo_db
      restart: unless-stopped

   db:
      image: postgres:16
      container_name: postgres_db
      environment:
         POSTGRES_USER: postgres
         POSTGRES_PASSWORD: postgres
         POSTGRES_DB: oldo_db
      ports:
         - "5432:5432"
      volumes:
         - pgdata:/var/lib/postgresql/data
      restart: unless-stopped

volumes:
   pgdata:
